<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% include seo.html %}
<meta name="application-name" content="{{ site.title | default: 'Rei Doda' | escape }}">
<meta property="og:site_name" content="{{ site.title | default: 'Rei Doda' | escape }}">
<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">
<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}" sizes="any">
<link rel="icon" type="image/png" sizes="96x96" href="{{ '/favicon-96x96.png' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/apple-touch-icon.png' | relative_url }}">
<link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
<link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }} Notes Feed" href="{{ '/feed.xml' | absolute_url }}">
<meta name="theme-color" content="#030303">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-title" content="Rei Doda">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<script defer src="{{ '/assets/js/main.js' | relative_url }}"></script>
{% assign load_news_scripts = false %}
{% if page.layout == 'news' or page.layout == 'post' or page.url == '/news/' or page.url contains '/news/' %}
  {% assign load_news_scripts = true %}
{% endif %}
{% if load_news_scripts %}
  <script defer src="{{ '/assets/js/news-filter.js' | relative_url }}"></script>
{% endif %}
