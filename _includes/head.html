<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% include seo.html %}
{% assign favicon_version = site.favicon_version | default: '20260307' %}
<link rel="icon" href="{{ '/assets/img/favicon/favicon.ico?v=' | append: favicon_version | relative_url }}" sizes="any">
<link rel="shortcut icon" href="{{ '/assets/img/favicon/favicon.ico?v=' | append: favicon_version | relative_url }}" type="image/x-icon">
<link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon/favicon.svg?v=' | append: favicon_version | relative_url }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/img/favicon/favicon-32x32.png?v=' | append: favicon_version | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/img/favicon/favicon-16x16.png?v=' | append: favicon_version | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/img/favicon/apple-touch-icon.png?v=' | append: favicon_version | relative_url }}">
<link rel="manifest" href="{{ '/assets/img/favicon/site.webmanifest?v=' | append: favicon_version | relative_url }}">
<link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }} News Feed" href="{{ '/feed.xml' | absolute_url }}">
<meta name="theme-color" content="#030303">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<script defer src="{{ '/assets/js/mobile-menu.js' | relative_url }}"></script>
<script defer src="{{ '/assets/js/reveal-effects.js' | relative_url }}"></script>
{% if page.url == '/' %}
  <script defer src="{{ '/assets/js/hero-neural-intro.js' | relative_url }}"></script>
  <script defer src="{{ '/assets/js/terminal-typewriter.js' | relative_url }}"></script>
{% endif %}
{% if page.url == '/experience/' %}
  <script defer src="{{ '/assets/js/roadmap.js' | relative_url }}"></script>
{% endif %}
{% if page.url == '/news/' %}
  <script defer src="{{ '/assets/js/news-filter.js' | relative_url }}"></script>
{% endif %}
<script defer src="{{ '/assets/js/main.js' | relative_url }}"></script>
