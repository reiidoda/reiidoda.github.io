<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>

    <nav aria-label="Primary navigation">
      <ul class="menu">
        {% for item in site.data.navigation %}
          <li>
            <a
              href="{{ item.url }}"
              {% if item.external %}target="_blank" rel="noopener noreferrer" aria-label="{{ item.title }} (opens in a new tab)"{% endif %}
            >
              {{ item.title }}{% if item.external %} <span aria-hidden="true">↗</span>{% endif %}
            </a>
          </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>
