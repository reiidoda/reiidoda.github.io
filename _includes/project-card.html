<article class="project-card" data-reveal>
  <header class="project-card-header">
    <p class="project-card-period">{{ include.project.period }}</p>
    <span class="project-card-github">GitHub</span>
  </header>

  <h3 class="project-card-title">{{ include.project.title }}</h3>
  <p class="project-card-summary">{{ include.project.summary }}</p>

  {% if include.project.stack and include.project.stack.size > 0 %}
    <ul class="tag-list" aria-label="Project technologies">
      {% for tech in include.project.stack %}
        <li class="tag-item">{{ tech }}</li>
      {% endfor %}
    </ul>
  {% endif %}
</article>
