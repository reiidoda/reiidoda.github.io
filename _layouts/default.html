<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    {% include head.html %}
  </head>
  {% assign page_class = page.body_class | default: page.layout | default: 'default' %}
  <body class="page-{{ page_class }}">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    {% include header.html %}

    <main id="main-content" tabindex="-1">
      {{ content }}
    </main>

    {% include footer.html %}
  </body>
</html>
