<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    {% include head.html %}
  </head>
  <body class="layout-{{ page.layout | default: 'default' }} page-{{ page.title | default: 'page' | slugify }}">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    {% include header.html %}

    <main id="main-content" class="container" tabindex="-1">
      {{ content }}
    </main>

    {% include footer.html %}
  </body>
</html>
