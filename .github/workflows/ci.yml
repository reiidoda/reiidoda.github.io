name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "2.7"
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(assets/js/*.js)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No JavaScript files found in assets/js"
            exit 1
          fi
          for file in "${files[@]}"; do
            echo "Checking ${file}"
            node --check "${file}"
          done

      - name: Build Jekyll site
        run: bundle exec jekyll build
