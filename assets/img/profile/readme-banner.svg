<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 560" role="img" aria-labelledby="title desc">
  <title id="title">Monochrome neural brain banner</title>
  <desc id="desc">Dark monochrome banner with layered neural connections forming a three-dimensional brain structure, without text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020202"/>
      <stop offset="55%" stop-color="#090909"/>
      <stop offset="100%" stop-color="#020202"/>
    </linearGradient>
    <radialGradient id="haze" cx="50%" cy="48%" r="44%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="52%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <marker id="dot" markerWidth="3" markerHeight="3" refX="1.5" refY="1.5">
      <circle cx="1.5" cy="1.5" r="1.4" fill="#f2f2f2" />
    </marker>
    <style>
      .shell {
        fill: none;
        stroke: #d8d8d8;
        stroke-width: 1.25;
        stroke-opacity: 0.34;
      }
      .wire {
        fill: none;
        stroke: #ececec;
        stroke-width: 1.05;
        stroke-opacity: 0.36;
        stroke-linecap: round;
      }
      .wire-soft {
        fill: none;
        stroke: #f6f6f6;
        stroke-width: 0.85;
        stroke-opacity: 0.2;
        stroke-linecap: round;
      }
      .node {
        fill: #fafafa;
        opacity: 0.86;
      }
      .node-soft {
        fill: #ffffff;
        opacity: 0.5;
      }
      .node-core {
        fill: #ffffff;
        opacity: 0.96;
      }
    </style>
  </defs>

  <rect width="1600" height="560" fill="url(#bg)" />
  <rect width="1600" height="560" fill="url(#haze)" />

  <g filter="url(#glow)" opacity="0.3">
    <circle cx="800" cy="286" r="145" fill="#ffffff" />
    <circle cx="706" cy="286" r="88" fill="#ffffff" />
    <circle cx="894" cy="286" r="88" fill="#ffffff" />
  </g>

