<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Rei Doda favicon</title>
  <desc id="desc">Dark rounded-square icon with cyan neural accents and a stylized R.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1d2d" />
      <stop offset="100%" stop-color="#07111a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ed8f0" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)" />
  <circle cx="120" cy="120" r="8" fill="#7ed8f0" opacity="0.65" />
  <circle cx="392" cy="388" r="10" fill="#38bdf8" opacity="0.6" />
  <circle cx="412" cy="128" r="7" fill="#7ed8f0" opacity="0.55" />
  <path d="M124 124 L388 388" stroke="#38bdf8" stroke-opacity="0.22" stroke-width="2" />

  <g filter="url(#glow)">
    <path d="M168 128 H272 C338 128 384 170 384 234 C384 295 341 338 280 342 H232 V384 H168 Z"
      fill="none" stroke="url(#accent)" stroke-width="36" stroke-linejoin="round" stroke-linecap="round" />
    <path d="M252 268 L362 386" fill="none" stroke="url(#accent)" stroke-width="34" stroke-linecap="round" />
  </g>
</svg>
