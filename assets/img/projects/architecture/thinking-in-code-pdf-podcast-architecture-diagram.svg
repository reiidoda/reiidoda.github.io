<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">thinking in code PDF to podcast architecture diagram</title>
  <desc id="desc">Architecture graph showing upload API, distributed worker queue, LLM and TTS adapters, and generated artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#d9d9d9"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g fill="none" stroke="#2a2a2a" stroke-width="1">
    <path d="M0 140 H1280"/><path d="M0 280 H1280"/><path d="M0 420 H1280"/><path d="M0 560 H1280"/>
  </g>
  <g font-family="SF Mono, JetBrains Mono, monospace" fill="#f5f5f5">
    <text x="56" y="60" font-size="28" font-weight="700">thinking_in_code Architecture</text>
    <text x="56" y="90" font-size="16" fill="#bdbdbd">FastAPI Upload API -> Redis Queue -> Worker Pipeline -> Script and Audio Artifacts</text>
  </g>
  <g stroke="#d6d6d6" fill="#101010" stroke-width="1.4" font-family="SF Mono, JetBrains Mono, monospace" font-size="16">
    <rect x="70" y="220" width="220" height="210" rx="18"/>
    <rect x="340" y="200" width="230" height="250" rx="18"/>
    <rect x="630" y="170" width="290" height="310" rx="18"/>
    <rect x="980" y="220" width="230" height="210" rx="18"/>
  </g>
  <g font-family="SF Mono, JetBrains Mono, monospace" fill="#f1f1f1" font-size="15">
    <text x="110" y="255">Client Upload</text>
    <text x="95" y="285" fill="#bdbdbd">PDF + style + duration</text>
    <text x="95" y="310" fill="#bdbdbd">SSE progress stream</text>

    <text x="385" y="235">FastAPI API</text>
    <text x="365" y="265" fill="#bdbdbd">Job registration</text>
    <text x="365" y="290" fill="#bdbdbd">Artifact endpoints</text>
    <text x="365" y="315" fill="#bdbdbd">Idempotency key</text>
    <text x="365" y="340" fill="#bdbdbd">Metrics summary</text>

    <text x="700" y="210">Worker Pipeline</text>
    <text x="670" y="240" fill="#bdbdbd">Extract + chunk + citation map</text>
    <text x="670" y="265" fill="#bdbdbd">RAG grounding</text>
    <text x="670" y="290" fill="#bdbdbd">LLM script generation</text>
    <text x="670" y="315" fill="#bdbdbd">TTS + audio assembly</text>
    <text x="670" y="340" fill="#bdbdbd">Retry + dead letter handling</text>

    <text x="1035" y="255">Artifacts</text>
    <text x="1010" y="285" fill="#bdbdbd">script.md</text>
    <text x="1010" y="310" fill="#bdbdbd">quality.json</text>
    <text x="1010" y="335" fill="#bdbdbd">episode.mp3</text>
  </g>
  <g stroke="#d9d9d9" stroke-width="2.2" marker-end="url(#arrow)">
    <line x1="290" y1="325" x2="340" y2="325"/>
    <line x1="570" y1="325" x2="630" y2="325"/>
    <line x1="920" y1="325" x2="980" y2="325"/>
  </g>
</svg>
