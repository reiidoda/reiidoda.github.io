<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">AI OCR document processing SaaS architecture diagram</title>
  <desc id="desc">Architecture graph showing ingestion pipeline, OCR extraction, LLM review service, and structured output delivery.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070707"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#d9d9d9"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g fill="none" stroke="#2a2a2a" stroke-width="1">
    <path d="M0 140 H1280"/><path d="M0 280 H1280"/><path d="M0 420 H1280"/><path d="M0 560 H1280"/>
  </g>
  <g font-family="SF Mono, JetBrains Mono, monospace" fill="#f5f5f5">
    <text x="56" y="60" font-size="28" font-weight="700">AI OCR Document SaaS Architecture</text>
    <text x="56" y="90" font-size="16" fill="#bdbdbd">Ingestion -> OCR Extraction -> LLM Review -> Structured Data and Workflow APIs</text>
  </g>
  <g stroke="#d6d6d6" fill="#101010" stroke-width="1.4" font-family="SF Mono, JetBrains Mono, monospace" font-size="15">
    <rect x="70" y="220" width="210" height="220" rx="18"/>
    <rect x="320" y="180" width="280" height="300" rx="18"/>
    <rect x="650" y="180" width="280" height="300" rx="18"/>
    <rect x="980" y="220" width="220" height="220" rx="18"/>
  </g>
  <g font-family="SF Mono, JetBrains Mono, monospace" fill="#f1f1f1" font-size="15">
    <text x="105" y="255">Ingestion</text>
    <text x="92" y="285" fill="#bdbdbd">Batch uploads</text>
    <text x="92" y="310" fill="#bdbdbd">Validation queue</text>

    <text x="380" y="220">OCR Pipeline</text>
    <text x="360" y="250" fill="#bdbdbd">Image preprocessing</text>
    <text x="360" y="275" fill="#bdbdbd">Text extraction</text>
    <text x="360" y="300" fill="#bdbdbd">Field normalization</text>
    <text x="360" y="325" fill="#bdbdbd">Django task workers</text>

    <text x="705" y="220">AI Review Layer</text>
    <text x="690" y="250" fill="#bdbdbd">LLM classification</text>
    <text x="690" y="275" fill="#bdbdbd">RAG context retrieval</text>
    <text x="690" y="300" fill="#bdbdbd">Confidence scoring</text>
    <text x="690" y="325" fill="#bdbdbd">Human review fallback</text>

    <text x="1020" y="255">Output Layer</text>
    <text x="1005" y="285" fill="#bdbdbd">Structured records</text>
    <text x="1005" y="310" fill="#bdbdbd">Audit and exports</text>
  </g>
  <g stroke="#d9d9d9" stroke-width="2.2" marker-end="url(#arrow)">
    <line x1="280" y1="330" x2="320" y2="330"/>
    <line x1="600" y1="330" x2="650" y2="330"/>
    <line x1="930" y1="330" x2="980" y2="330"/>
  </g>
</svg>
